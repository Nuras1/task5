<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>task5</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <link href="/css/site.css" rel="stylesheet">
</head>

<body>

    <div class="toolbar">
        <div class="container mt-3">
            <div class="d-flex gap-3 align-items-center">

                <select id="language" class="form-select w-auto">
                    <option value="en">English (US)</option>
                    <option value="de">Deutsch</option>
                </select>

                <input id="seed" type="number" class="form-control w-auto" value="123456">

                <button id="randomSeed" class="btn btn-outline-secondary">
                    <i class="bi bi-shuffle"></i>
                </button>

                <div class="d-flex align-items-center gap-2">
                    <span>Likes</span>
                    <input id="likes" type="range" min="0" max="10" step="0.1" value="5">
                </div>

                <div class="ms-auto">
                    <button id="tableBtn" class="btn btn-primary">
                        <i class="bi bi-table"></i>
                    </button>
                    <button id="galleryBtn" class="btn btn-outline-primary">
                        <i class="bi bi-grid"></i>
                    </button>
                </div>

            </div>
        </div>
    </div>

    <audio id="player" style="display:none"></audio>

    <div class="container mt-4">
        <div id="content" class="row g-4"></div>
    </div>

    <div id="pagination" class="container mt-2 mb-4"></div>

    <script src="/js/site.js"></script>

</body>
</html>
